# Local dev Postgres+PostGIS - matches the CI service container and the RDS engine version
# (see .github/workflows/ci.yml and infra/cdk/). Not used in production; ECS gets its DB from
# RDS via Secrets Manager-injected env vars.
services:
  postgres:
    image: postgis/postgis:16-3.4
    environment:
      POSTGRES_USER: foray
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-foray}
      POSTGRES_DB: foray
    ports:
      - "5432:5432"
    volumes:
      - foray-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U foray"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  foray-postgres-data:
