# Local dev stack. Production uses ECS + RDS (see infra/cdk/).
services:
  postgres:
    image: postgis/postgis:16-3.4
    environment:
      POSTGRES_USER: foray
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-foray}
      POSTGRES_DB: foray
    ports:
      - "5432:5432"
    volumes:
      - foray-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U foray"]
      interval: 5s
      timeout: 5s
      retries: 10

  app:
    build:
      context: .
      target: runtime
    ports:
      - "8000:8000"
    environment:
      PGHOST: postgres
      PGPORT: "5432"
      PGUSER: foray
      PGPASSWORD: ${POSTGRES_PASSWORD:-foray}
      PGDATABASE: foray
    depends_on:
      postgres:
        condition: service_healthy
    command: ["foray", "serve", "--host", "0.0.0.0", "--port", "8000"]
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://127.0.0.1:8000/api/config', timeout=4).status==200 else 1)"]
      interval: 10s
      timeout: 5s
      start_period: 15s
      retries: 3

  scheduler:
    build:
      context: .
      target: runtime
    environment:
      PGHOST: postgres
      PGPORT: "5432"
      PGUSER: foray
      PGPASSWORD: ${POSTGRES_PASSWORD:-foray}
      PGDATABASE: foray
      FORAY_INGEST_INTERVAL_HOURS: "${FORAY_INGEST_INTERVAL_HOURS:-24}"
      FORAY_LAYERS_INTERVAL_HOURS: "${FORAY_LAYERS_INTERVAL_HOURS:-168}"
    depends_on:
      postgres:
        condition: service_healthy
    command: ["sh", "scripts/scheduler.sh"]

volumes:
  foray-postgres-data:
