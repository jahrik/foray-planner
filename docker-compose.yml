# Local dev stack. Production uses ECS + RDS (see infra/cdk/).
x-postgres-env: &postgres-env
  PGHOST: postgres
  PGPORT: "5432"
  PGUSER: foray
  PGPASSWORD: ${POSTGRES_PASSWORD:-foray}
  PGDATABASE: foray

# RIDB_API_KEY is optional (campground ingest is skipped without it); pass it through
# from the shell environment or a local .env file so `foray refresh`, whether triggered
# by the app's /api/refresh or the scheduler, can see it.
x-ridb-env: &ridb-env
  RIDB_API_KEY: ${RIDB_API_KEY:-}

x-runtime-build: &runtime-build
  context: .
  target: runtime

x-depends-postgres: &depends-postgres
  postgres:
    condition: service_healthy

services:
  postgres:
    image: postgis/postgis:16-3.4
    environment:
      POSTGRES_USER: foray
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-foray}
      POSTGRES_DB: foray
    ports:
      - "5432:5432"
    volumes:
      - foray-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U foray"]
      interval: 5s
      timeout: 5s
      retries: 10

  app:
    build:
      <<: *runtime-build
    ports:
      - "8000:8000"
    environment:
      <<: [*postgres-env, *ridb-env]
    depends_on:
      <<: *depends-postgres
    command: ["foray", "serve", "--host", "0.0.0.0", "--port", "8000"]
    healthcheck:
      test: ["CMD", "python", "scripts/healthcheck.py"]
      interval: 10s
      timeout: 5s
      start_period: 15s
      retries: 3

  scheduler:
    profiles: [scheduler]
    build:
      <<: *runtime-build
    environment:
      <<: [*postgres-env, *ridb-env]
      # Fallback defaults (24h / 168h) live in scripts/scheduler.sh, not here.
      FORAY_INGEST_INTERVAL_HOURS: ${FORAY_INGEST_INTERVAL_HOURS:-}
      FORAY_LAYERS_INTERVAL_HOURS: ${FORAY_LAYERS_INTERVAL_HOURS:-}
    depends_on:
      <<: *depends-postgres
    command: ["sh", "scripts/scheduler.sh"]

volumes:
  foray-postgres-data:
