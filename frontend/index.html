<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Foray Planner</title>
    <script>
      // Set the theme before first paint so light-mode users don't flash dark. Default = dark.
      (function () {
        try {
          document.documentElement.dataset.theme =
            localStorage.getItem("foray-theme") === "light" ? "light" : "dark";
        } catch (e) {
          document.documentElement.dataset.theme = "dark";
        }
      })();
    </script>
  </head>
  <body>
    <header>
      <div class="topline">
        <h1>🍄 Foray Planner</h1>
        <button type="button" id="theme-toggle" class="theme-toggle" aria-label="Toggle theme">
          🌙
        </button>
      </div>
      <p class="home" id="home-line">
        Location: <strong id="home-name">…</strong>
        (<span id="home-coords">…</span>) · radius <span id="home-radius">…</span> km
      </p>
      <form class="locbar" id="locform">
        <input
          id="loc"
          type="text"
          placeholder="Set location — place name or lat,lng (e.g. Coos Bay, OR)"
          autocomplete="off"
        />
        <button type="submit" class="primary">Set location</button>
        <span class="loc-hint">Changing location re-fetches iNaturalist data for the new area.</span>
      </form>
    </header>

    <section class="controls">
      <div class="row">
        <div class="field">
          <label>Months</label>
          <div id="months" class="months"></div>
        </div>
        <div class="field">
          <label for="species">Target species</label>
          <select id="species" multiple size="4"></select>
          <small>Ctrl/Cmd-click for multiple · none = all</small>
        </div>
      </div>

      <div class="row">
        <div class="field">
          <label>Map Layers</label>
          <div class="toggle-group">
            <label class="toggle-btn"><input type="checkbox" id="show-camps" /> <span>🏕️ Campgrounds</span></label>
            <label class="toggle-btn"><input type="checkbox" id="show-dispersed" /> <span>🚐 Dispersed (OSM)</span></label>
            <label class="toggle-btn"><input type="checkbox" id="free-camps" /> <span>🆓 Free Camps Only</span></label>
            <label class="toggle-btn"><input type="checkbox" id="show-land" /> <span>🌲 Public Land</span></label>
            <label class="toggle-btn"><input type="checkbox" id="show-trails" /> <span>🥾 Trails</span></label>
          </div>
        </div>
      </div>
      <div class="field actions centered">
        <button id="run" class="primary">Rank destinations</button>
        <button id="refresh">Refresh data</button>
        <span id="status"></span>
        <progress id="refresh-progress" value="0" max="100" style="display: none;" aria-label="Refresh Progress"></progress>
      </div>
    </section>

    <nav class="tabs">
      <button data-view="destinations" class="active">Destinations</button>
      <button data-view="calendar">Place calendar</button>
      <button data-view="alerts">Fruiting now</button>
    </nav>

    <main>
      <div id="map"></div>
      <aside id="panel">
        <p class="hint">Pick months and click <em>Rank destinations</em>.</p>
      </aside>
    </main>

    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
