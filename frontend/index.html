<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#12140f" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
    <title>Foray Planner</title>
    <script>
      // Set the theme before first paint so light-mode users don't flash dark. Default = dark.
      (function () {
        try {
          document.documentElement.dataset.theme =
            localStorage.getItem("foray-theme") === "light" ? "light" : "dark";
        } catch (e) {
          document.documentElement.dataset.theme = "dark";
        }
      })();
    </script>
  </head>
  <body>
    <header>
      <h1>🍄 Foray Planner</h1>
      <div class="locbar" id="locform-wrap">
        <form id="locform" autocomplete="off">
          <input
            id="loc"
            type="text"
            placeholder="Search location…"
            autocomplete="off"
          />
          <ul id="loc-suggestions" class="loc-suggestions"></ul>
        </form>
        <span class="loc-current" id="home-line">
          <strong id="home-name">…</strong>
          <span class="loc-meta">(<span id="home-coords">…</span>) · <span id="home-radius">…</span></span>
        </span>
        <div class="radius-presets" id="radius-presets">
          <button type="button" data-km="50">50</button>
          <button type="button" data-km="150">150</button>
          <button type="button" data-km="300">300</button>
          <button type="button" data-km="500">500</button>
        </div>
      </div>
      <div class="header-actions">
        <button type="button" id="units-toggle" class="theme-toggle" aria-label="Toggle units">mi</button>
        <button type="button" id="theme-toggle" class="theme-toggle" aria-label="Toggle theme">🌙</button>
      </div>
    </header>

    <section class="controls">
      <div class="row">
        <div class="field">
          <label>Months</label>
          <div id="months" class="months"></div>
        </div>
        <div class="field">
          <label>Layers</label>
          <div class="toggle-group">
            <label class="toggle-btn"><input type="checkbox" id="show-camps" /> <span>Campgrounds</span></label>
            <label class="toggle-btn"><input type="checkbox" id="show-dispersed" /> <span>Dispersed</span></label>
            <label class="toggle-btn"><input type="checkbox" id="free-camps" /> <span>Free only</span></label>
            <label class="toggle-btn"><input type="checkbox" id="show-land" /> <span>Public land</span></label>
            <label class="toggle-btn"><input type="checkbox" id="show-trails" /> <span>Trails</span></label>
          </div>
        </div>
        <div class="field" style="align-self:flex-end">
          <button id="run" class="primary">Rank destinations</button>
        </div>
        <div class="field" style="align-self:flex-end">
          <button id="refresh">Refresh</button>
        </div>
        <div class="field action-status" style="align-self:flex-end">
          <span id="status"></span>
          <progress id="refresh-progress" value="0" max="100" style="display: none;" aria-label="Refresh Progress"></progress>
          <span id="coverage-indicator" class="coverage-indicator"></span>
        </div>
      </div>
      <div class="row plan-row" id="plan-row" style="display:none">
        <div class="field">
          <label for="plan-stops">Max stops</label>
          <input id="plan-stops" type="number" min="1" max="20" value="5" />
        </div>
        <div class="field">
          <label for="plan-drive">Max leg (km)</label>
          <input id="plan-drive" type="number" min="50" max="2000" value="400" step="50" />
        </div>
        <div class="field" style="justify-content:flex-end">
          <label class="toggle-btn">
            <input type="checkbox" id="plan-free-camp" checked />
            <span>Free camp</span>
          </label>
        </div>
      </div>
    </section>

    <nav class="tabs">
      <button data-view="destinations" class="active">Destinations</button>
      <button data-view="calendar">Place calendar</button>
      <button data-view="alerts">Fruiting now</button>
      <button data-view="plan">🗺️ Plan route</button>
    </nav>

    <main>
      <div class="map-wrap">
        <div id="map"></div>
        <div id="legend" class="map-legend"></div>
      </div>
      <aside id="panel">
        <p class="hint">Finding your best destination…</p>
      </aside>
    </main>

    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
