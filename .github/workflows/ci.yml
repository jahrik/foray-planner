name: CI

on:
  push:
    branches: ["main"]
  pull_request:

# Cancel superseded runs on the same ref (e.g. new push to a PR).
concurrency:
  group: "ci-${{ github.workflow }}-${{ github.ref }}"
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  python:
    name: Lint, type-check, test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Set up uv
        uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true

      - name: Install dependencies
        run: uv sync --frozen

      - name: Lint + type-check
        run: make lint

      - name: Tests
        run: make test

  frontend:
    name: Build client (type-check + bundle)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Set up Node
        uses: actions/setup-node@v7
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Set up uv
        uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true

      - name: Install dependencies
        run: uv sync --frozen

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: Type-check + build (tsc --noEmit + vite build)
        run: make frontend

      - name: API schema up to date (foray openapi + openapi-typescript, fails on drift)
        run: make check-api-schema

  docker:
    name: Lint + build image
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Hadolint
        uses: hadolint/hadolint-action@v3.3.0
        with:
          dockerfile: Dockerfile

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build image (no push)
        uses: docker/build-push-action@v7
        with:
          context: .
          push: false
          load: true
          tags: "local/foray-planner:ci"
          cache-from: type=gha
          cache-to: type=gha,mode=max
