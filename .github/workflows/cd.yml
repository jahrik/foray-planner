name: CD

on:
  push:
    branches: ["main"]
    tags: ["v*"]
  workflow_dispatch:

concurrency:
  group: "cd-${{ github.ref }}"
  cancel-in-progress: false

permissions:
  contents: read
  packages: write

env:
  IMAGE: "ghcr.io/${{ github.repository }}"

jobs:
  publish:
    name: Build + push to GHCR
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker metadata (tags + labels)
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.IMAGE }}
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=sha,format=short
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build + push (amd64, arm64)
        id: build
        uses: docker/build-push-action@v7
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

    outputs:
      image_digest: ${{ steps.build.outputs.digest }}

  deploy:
    name: Deploy to production
    needs: publish
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    environment: production
    concurrency:
      group: cd-deploy-production
      cancel-in-progress: false
    steps:
      - uses: actions/checkout@v7

      # GitHub-hosted runners don't egress from a single stable IP for the whole job - a
      # connection made a few seconds after another can come from a different address in the
      # same NAT pool. A bare /32 allowlist entry for one detected IP isn't reliable, so this
      # looks up which of GitHub's published Actions CIDR blocks (api.github.com/meta) contains
      # the detected IP and allows that whole block instead - falls back to a /32 if it isn't
      # found in the list (e.g. GitHub's list omitted it) rather than failing the job.
      - name: Determine this runner's public IP and containing GitHub Actions CIDR
        id: whoami
        run: |
          IP=$(curl -sf https://api.ipify.org)
          echo "ip=$IP" >> "$GITHUB_OUTPUT"
          CIDR=$(python3 -c "
          import ipaddress, json, urllib.request
          ip = ipaddress.ip_address('$IP')
          try:
              with urllib.request.urlopen('https://api.github.com/meta', timeout=10) as r:
                  meta = json.load(r)
              for block in meta.get('actions', []):
                  if ip in ipaddress.ip_network(block, strict=False):
                      print(block)
                      raise SystemExit
              print('$IP/32')
          except Exception:
              print('$IP/32')
          ")
          echo "cidr=$CIDR" >> "$GITHUB_OUTPUT"

      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install Ansible
        working-directory: infra/ansible
        run: |
          pip install uv
          uv sync
          uv run ansible-galaxy collection install -r requirements.yml

      - name: Write the deploy SSH key
        run: |
          install -d -m 700 ~/.ssh
          printf '%s\n' "${{ secrets.FORAY_DEPLOY_SSH_KEY }}" > ~/.ssh/foray_deploy_key
          chmod 600 ~/.ssh/foray_deploy_key

      - name: Allow this runner's IP through the DO firewall
        working-directory: infra/ansible
        env:
          DO_API_TOKEN: ${{ secrets.DO_API_TOKEN }}
        run: |
          uv run ansible-playbook site.yml --tags foray:firewall-allow-runner \
            -e foray_ci_runner_cidr="${{ steps.whoami.outputs.cidr }}" \
            -e foray_droplet_ip="${{ secrets.FORAY_DROPLET_IP }}"

      # Only reachable now that the runner's IP is allowlisted - scanning before the firewall
      # step would fail/hang against a locked-down droplet.
      - name: Collect the droplet's SSH host key
        run: ssh-keyscan -H "${{ secrets.FORAY_DROPLET_IP }}" >> ~/.ssh/known_hosts

      - name: Deploy
        working-directory: infra/ansible
        env:
          DO_API_TOKEN: ${{ secrets.DO_API_TOKEN }}
          FORAY_TLS_CERT: ${{ secrets.FORAY_TLS_CERT }}
          FORAY_TLS_KEY: ${{ secrets.FORAY_TLS_KEY }}
          RIDB_API_KEY: ${{ secrets.RIDB_API_KEY }}
        run: |
          uv run ansible-playbook site.yml --tags foray:deploy \
            -i inventory/hosts.yml \
            -e foray_droplet_ip="${{ secrets.FORAY_DROPLET_IP }}" \
            -e ansible_ssh_private_key_file=~/.ssh/foray_deploy_key \
            -e foray_app_image="ghcr.io/${{ github.repository }}@${{ needs.publish.outputs.image_digest }}"

      - name: Revoke this runner's IP from the DO firewall
        if: always()
        working-directory: infra/ansible
        env:
          DO_API_TOKEN: ${{ secrets.DO_API_TOKEN }}
        run: |
          uv run ansible-playbook site.yml --tags foray:firewall-revoke-runner \
            -e foray_ci_runner_cidr="${{ steps.whoami.outputs.cidr }}"
