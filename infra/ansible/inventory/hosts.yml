---
# For deploy-only runs (--tags foray:deploy), set the droplet IP here or
# pass it via -e: ansible-playbook site.yml -i inventory/hosts.yml -e foray_droplet_ip=...
all:
  children:
    foray:
      hosts:
        foray-prod:
          ansible_host: "{{ foray_droplet_ip | default('127.0.0.1') }}"
          ansible_user: root
