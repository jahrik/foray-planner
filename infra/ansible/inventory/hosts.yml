---
# For deploy-only runs (--tags foray:deploy), pass the droplet IP via:
#   -e foray_droplet_ip=<ip>
# The playbook will fail if foray_droplet_ip is not set.
all:
  children:
    foray:
      hosts:
        foray-prod:
          ansible_host: "{{ foray_droplet_ip }}"
          ansible_user: root
          # Pinned explicitly (docker-20-04 image default) instead of relying on Ansible's
          # interpreter auto-discovery: silences the discovery warning and gives every run a
          # stable, version-controlled path, so a second Python install on the droplet can't
          # change which interpreter gets *discovered*. This doesn't lock the Python version
          # itself - /usr/bin/python3 is a distro-managed symlink that can still repoint to a
          # different minor version on an OS/package update. See
          # https://docs.ansible.com/ansible-core/2.21/reference_appendices/interpreter_discovery.html
          ansible_python_interpreter: /usr/bin/python3
