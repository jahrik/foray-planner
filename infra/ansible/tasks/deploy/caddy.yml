---
- name: Fail unless exactly one TLS cert/key source is set
  ansible.builtin.assert:
    that: >-
      (foray_tls_cert_path | length > 0 and foray_tls_key_path | length > 0
       and foray_tls_cert_content | length == 0 and foray_tls_key_content | length == 0)
      or (foray_tls_cert_content | length > 0 and foray_tls_key_content | length > 0
          and foray_tls_cert_path | length == 0 and foray_tls_key_path | length == 0)
    fail_msg: >-
      Set exactly one TLS source - either FORAY_TLS_CERT_PATH + FORAY_TLS_KEY_PATH (local
      cert/key files, for the operator's manual deploy) or FORAY_TLS_CERT + FORAY_TLS_KEY
      (inline cert/key content, used by CI) - not a mix of both. See .env / docs/deployment.md.

# Local-operator path: cert/key live as files on the machine running ansible-playbook.
- name: Check the cert/key files exist locally
  ansible.builtin.stat:
    path: "{{ item }}"
  loop:
    - "{{ foray_tls_cert_path }}"
    - "{{ foray_tls_key_path }}"
  register: foray_tls_file_stats
  delegate_to: localhost
  become: false
  when: foray_tls_cert_content | length == 0

- name: Fail if either file is missing
  ansible.builtin.assert:
    that: "item.stat.exists"
    fail_msg: "{{ item.item }} does not exist - check FORAY_TLS_CERT_PATH/FORAY_TLS_KEY_PATH in .env."
  loop: "{{ foray_tls_file_stats.results }}"
  loop_control:
    label: "{{ item.item }}"
  when: foray_tls_cert_content | length == 0

- name: Ensure the TLS directory exists
  ansible.builtin.file:
    path: /opt/foray-planner/tls
    state: directory
    mode: "0700"
    owner: root
    group: root

- name: Copy the origin certificate (from local path)
  ansible.builtin.copy:
    src: "{{ foray_tls_cert_path }}"
    dest: /opt/foray-planner/tls/origin.pem
    mode: "0600"
    owner: root
    group: root
  when: foray_tls_cert_content | length == 0
  notify: restart caddy

- name: Copy the origin private key (from local path)
  ansible.builtin.copy:
    src: "{{ foray_tls_key_path }}"
    dest: /opt/foray-planner/tls/origin.key
    mode: "0600"
    owner: root
    group: root
  when: foray_tls_key_content | length == 0
  notify: restart caddy

# CI path: cert/key content comes from a secret and is written straight to the remote host -
# never touches disk on the CI runner.
- name: Write the origin certificate (from inline content)
  ansible.builtin.copy:
    content: "{{ foray_tls_cert_content }}"
    dest: /opt/foray-planner/tls/origin.pem
    mode: "0600"
    owner: root
    group: root
  when: foray_tls_cert_content | length > 0
  notify: restart caddy

- name: Write the origin private key (from inline content)
  ansible.builtin.copy:
    content: "{{ foray_tls_key_content }}"
    dest: /opt/foray-planner/tls/origin.key
    mode: "0600"
    owner: root
    group: root
  when: foray_tls_key_content | length > 0
  notify: restart caddy

- name: Write the Caddyfile
  ansible.builtin.template:
    src: Caddyfile.j2
    dest: /opt/foray-planner/Caddyfile
    mode: "0600"
    owner: root
    group: root
  notify: restart caddy

- name: Run the caddy container
  community.docker.docker_container:
    name: "{{ foray_caddy_container_name }}"
    image: "{{ foray_caddy_image }}"
    state: started
    restart_policy: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - /opt/foray-planner/Caddyfile:/etc/caddy/Caddyfile:ro
      - /opt/foray-planner/tls:/etc/caddy/tls:ro
    networks:
      - name: "{{ foray_docker_network }}"
