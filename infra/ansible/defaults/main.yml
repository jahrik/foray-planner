---
# Digital Ocean API token — never set here in a public repo; pass via
# environment variable DO_API_TOKEN or --extra-vars at runtime.
foray_do_token: "{{ lookup('ansible.builtin.env', 'DO_API_TOKEN') }}"

# Region for all DO resources (droplet + managed database)
foray_do_region: sfo3

# Droplet configuration
foray_do_droplet_name: foray-planner
foray_do_droplet_size: s-1vcpu-1gb
foray_do_droplet_image: docker-20-04
foray_do_ssh_key_name: ""

# Managed Postgres cluster
foray_do_db_cluster_name: foray-postgres
foray_do_db_size: db-s-1vcpu-1gb
foray_do_db_engine: pg
foray_do_db_version: "16"
foray_do_db_name: foray

# Container image (published by CD pipeline on every push to main)
foray_app_image: ghcr.io/jahrik/foray-planner:latest
foray_app_container_name: foray-planner
foray_docker_network: foray-net

# Caddy terminates TLS on 80/443 and reverse-proxies to the app container over the
# foray_docker_network - the app container itself no longer publishes a host port.
foray_domain: forayplanner.com
foray_caddy_container_name: foray-planner-caddy
foray_caddy_image: caddy:2-alpine

# Cloudflare Origin CA cert/key - generated in the Cloudflare dashboard, saved locally, and
# referenced here by path only; never committed or pasted into this repo.
foray_tls_cert_path: "{{ lookup('ansible.builtin.env', 'FORAY_TLS_CERT_PATH') }}"
foray_tls_key_path: "{{ lookup('ansible.builtin.env', 'FORAY_TLS_KEY_PATH') }}"

# RIDB API key — optional, campground ingest is skipped without it.
# Pass via environment or --extra-vars; never commit.
foray_ridb_api_key: "{{ lookup('ansible.builtin.env', 'RIDB_API_KEY') }}"

# App configuration (pydantic-settings env vars)
foray_home_lat: "47.6062"
foray_home_lng: "-122.3321"
foray_home_radius_km: "150"

# Cron: observation ingest (daily at 04:00 UTC)
foray_ingest_cron_hour: "4"
foray_ingest_cron_minute: "0"

# Cron: full layer refresh (weekly Sunday at 03:00 UTC)
foray_layers_cron_hour: "3"
foray_layers_cron_minute: "0"
foray_layers_cron_weekday: "0"

# Firewall rules — restrict SSH to your IP/VPN CIDR (required, no default)
foray_do_firewall_name: foray-planner-fw
foray_ssh_allowed_ips: []

# Cloudflare's published edge IP ranges — 80/443 on the droplet are restricted to these so the
# origin can't be reached directly, bypassing Cloudflare's TLS/WAF/rate-limiting. Sourced from
# https://www.cloudflare.com/ips-v4 and https://www.cloudflare.com/ips-v6 (checked 2026-07-14).
# Cloudflare changes these rarely; re-fetch and update here if origin traffic ever starts 403ing
# at the DO firewall level.
foray_cloudflare_ipv4:
  - 173.245.48.0/20
  - 103.21.244.0/22
  - 103.22.200.0/22
  - 103.31.4.0/22
  - 141.101.64.0/18
  - 108.162.192.0/18
  - 190.93.240.0/20
  - 188.114.96.0/20
  - 197.234.240.0/22
  - 198.41.128.0/17
  - 162.158.0.0/15
  - 104.16.0.0/13
  - 104.24.0.0/14
  - 172.64.0.0/13
  - 131.0.72.0/22
foray_cloudflare_ipv6:
  - 2400:cb00::/32
  - 2606:4700::/32
  - 2803:f800::/32
  - 2405:b500::/32
  - 2405:8100::/32
  - 2a06:98c0::/29
  - 2c0f:f248::/32
