---
- name: Provision Digital Ocean infrastructure
  hosts: localhost
  connection: local
  gather_facts: false
  vars_files:
    - defaults/main.yml
  tasks:
    - name: Include database provisioning
      ansible.builtin.include_tasks:
        file: tasks/provision/database.yml
        apply:
          tags:
            - foray
            - "foray:provision"
            - "foray:deploy"
      tags:
        - foray
        - "foray:provision"
        - "foray:deploy"

    - name: Include droplet provisioning
      ansible.builtin.include_tasks:
        file: tasks/provision/droplet.yml
        apply:
          tags:
            - foray
            - "foray:provision"
      tags:
        - foray
        - "foray:provision"

    - name: Include firewall provisioning
      ansible.builtin.include_tasks:
        file: tasks/provision/firewall.yml
        apply:
          tags:
            - foray
            - "foray:provision"
      tags:
        - foray
        - "foray:provision"

    # Runs after firewall provisioning, not inside tasks/provision/droplet.yml - the firewall
    # is what opens port 22 for foray_ssh_allowed_ips, so waiting for SSH before it exists
    # means the first provision run after the operator's IP changes always times out.
    - name: Wait for SSH to become available
      ansible.builtin.wait_for:
        host: "{{ foray_droplet_ip }}"
        port: 22
        delay: 10
        timeout: 120
      when: foray_droplet_ip is defined
      tags:
        - foray
        - "foray:provision"

    - name: Include droplet resize
      ansible.builtin.include_tasks:
        file: tasks/provision/droplet_resize.yml
        apply:
          tags:
            - "foray:resize"
            - never
      tags:
        - "foray:resize"
        - never

- name: Deploy foray-planner
  hosts: foray
  gather_facts: false
  vars_files:
    - defaults/main.yml
  tasks:
    - name: Create app directory
      ansible.builtin.file:
        path: /opt/foray-planner
        state: directory
        mode: "0700"
      tags:
        - foray
        - "foray:deploy"
        - "foray:cron"

    - name: Include docker network tasks
      ansible.builtin.include_tasks:
        file: tasks/deploy/network.yml
        apply:
          tags:
            - foray
            - "foray:deploy"
      tags:
        - foray
        - "foray:deploy"

    - name: Include deploy tasks
      ansible.builtin.include_tasks:
        file: tasks/deploy/app.yml
        apply:
          tags:
            - foray
            - "foray:deploy"
      tags:
        - foray
        - "foray:deploy"

    - name: Include caddy (TLS reverse proxy) tasks
      ansible.builtin.include_tasks:
        file: tasks/deploy/caddy.yml
        apply:
          tags:
            - foray
            - "foray:deploy"
      tags:
        - foray
        - "foray:deploy"

    - name: Include cron tasks
      ansible.builtin.include_tasks:
        file: tasks/deploy/cron.yml
        apply:
          tags:
            - foray
            - "foray:cron"
      tags:
        - foray
        - "foray:cron"

    - name: Include one-off genus catalog refresh task
      ansible.builtin.include_tasks:
        file: tasks/deploy/genera_once.yml
        apply:
          tags:
            - "foray:genera-once"
            - never
      tags:
        - "foray:genera-once"
        - never

    - name: Include one-off ingest task
      ansible.builtin.include_tasks:
        file: tasks/deploy/ingest_once.yml
        apply:
          tags:
            - "foray:ingest-once"
            - never
      tags:
        - "foray:ingest-once"
        - never

    - name: Include one-off bulk load task
      ansible.builtin.include_tasks:
        file: tasks/deploy/bulk_load_once.yml
        apply:
          tags:
            - "foray:bulk-load-once"
            - never
      tags:
        - "foray:bulk-load-once"
        - never

  handlers:
    - name: Include handlers
      ansible.builtin.import_tasks:
        file: handlers/main.yml

# CI-internal only: adds/removes the CI runner's own IP from the live SSH firewall rule around
# an automated foray:deploy run. Never bundled into the `foray` or `foray:deploy` tag groups -
# always invoked as its own separate ansible-playbook run so a workflow-level `if: always()`
# cleanup step can reliably revoke access regardless of how the deploy run exited.
- name: Manage CI runner IP in the firewall (deploy pipeline only)
  hosts: localhost
  connection: local
  gather_facts: false
  vars_files:
    - defaults/main.yml
  tasks:
    - name: Allow the CI runner's IP in the SSH allowlist
      ansible.builtin.include_tasks:
        file: tasks/deploy/firewall_allow_runner.yml
        apply:
          tags:
            - "foray:firewall-allow-runner"
            - never
      tags:
        - "foray:firewall-allow-runner"
        - never

    - name: Revoke the CI runner's IP from the SSH allowlist
      ansible.builtin.include_tasks:
        file: tasks/deploy/firewall_revoke_runner.yml
        apply:
          tags:
            - "foray:firewall-revoke-runner"
            - never
      tags:
        - "foray:firewall-revoke-runner"
        - never
